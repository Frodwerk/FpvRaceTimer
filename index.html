<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPV Pro Race Timer - Multilingual</title>
  
  <style>
    :root {
      --primary: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --highlight: rgba(245, 158, 11, 0.15);
      --crown-color: #ffd700;
      --modal-bg: rgba(15, 23, 42, 0.95);
    }

    body {
      margin: 0;
      padding: 10px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .container {
      max-width: 950px;
      margin: auto;
      background: var(--card-bg);
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* Modern Language Toggle Switch */
    .header-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 15px;
      align-items: center;
      gap: 10px;
    }

    .lang-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #334155;
      transition: .4s;
      border-radius: 24px;
      border: 1px solid #475569;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--primary);
      border-color: var(--primary);
    }

    input:focus + .slider {
      box-shadow: 0 0 1px var(--primary);
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    .video-wrapper {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      width: 100%;
    }

    canvas { width: 100%; height: 100%; display: block; }

    .gate-overlay {
      position: absolute;
      pointer-events: none;
      z-index: 5;
    }

    .line-v { top: 0; left: 50%; width: 2px; height: 100%; border-left: 2px dashed rgba(16, 185, 129, 0.8); transform: translateX(-50%); }
    .line-h { top: 50%; left: 0; width: 100%; height: 2px; border-top: 2px dashed rgba(16, 185, 129, 0.8); transform: translateY(-50%); }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 15px 0;
    }

    @media (min-width: 640px) {
      .dashboard { grid-template-columns: repeat(4, 1fr); }
    }

    .stat-box {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 18px; font-weight: 700; display: block; margin-top: 4px; font-family: monospace; }

    .action-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      min-width: 100px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-main { background: var(--primary); color: white; }
    .btn-stop { background: var(--danger); color: white; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); }
    .btn-accent { background: #6366f1; color: white; }
    .btn-import { background: #8b5cf6; color: white; }
    
    .btn-toggle-lap { 
      background: transparent; 
      color: var(--text-muted); 
      padding: 8px; 
      min-width: auto; 
      flex: none; 
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-toggle-lap.active { color: var(--primary); border-color: var(--primary); }
    .btn-toggle-lap.inactive { color: var(--danger); border-color: var(--danger); }

    .settings-panel {
      background: rgba(0,0,0,0.2);
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .input-field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
    .input-field select, .input-field input {
      width: 100%;
      background: #334155;
      border: 1px solid #475569;
      color: white;
      padding: 8px;
      border-radius: 6px;
      box-sizing: border-box;
    }

    #importModal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--modal-bg);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background: var(--card-bg);
      width: 90%;
      max-width: 500px;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-title { font-size: 18px; font-weight: bold; }

    .modal-textarea {
      width: 100%;
      height: 200px;
      background: #0f172a;
      border: 1px solid #475569;
      color: white;
      padding: 12px;
      border-radius: 10px;
      font-family: monospace;
      font-size: 12px;
      resize: none;
      box-sizing: border-box;
      margin-bottom: 15px;
    }

    .table-container {
      margin-top: 20px;
      border-radius: 12px;
      background: rgba(0,0,0,0.2);
      max-height: 400px;
      overflow-y: auto;
    }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px; font-size: 12px; color: var(--text-muted); border-bottom: 1px solid #334155; position: sticky; top: 0; background: #1e293b; z-index: 10; }
    td { padding: 12px; border-bottom: 1px solid #334155; font-size: 13px; vertical-align: middle; transition: background 0.3s; font-family: monospace; }

    .lap-record { color: var(--warning); font-weight: bold; }
    .crown-icon { color: var(--crown-color); margin-right: 5px; font-style: normal; }
    
    .img-pair { display: flex; gap: 6px; padding: 4px 0; }
    .img-container { position: relative; }
    .img-preview { 
      width: 100px; 
      height: 75px; 
      border-radius: 6px; 
      object-fit: cover; 
      border: 2px solid rgba(255,255,255,0.15);
      display: block;
      background: #000;
    }
    .img-label { font-size: 9px; font-weight: bold; color: var(--text-muted); display: block; text-align: center; margin-bottom: 4px; font-family: sans-serif; }

    #hud {
      position: absolute;
      top: 10px; left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 5px 10px;
      border-radius: 6px;
      font-family: monospace;
      color: var(--primary);
      z-index: 10;
    }

    #big-timer {
      position: absolute;
      bottom: 20px; right: 20px;
      font-size: 48px; font-weight: 800;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      color: white;
      z-index: 10;
      font-family: monospace;
    }

    #countdown {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      font-size: 150px;
      font-weight: bold;
      z-index: 20;
    }
    
    .status-light {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 5px;
    }
    .status-active { background: var(--primary); box-shadow: 0 0 8px var(--primary); }
    .status-idle { background: #475569; }
  </style>
</head>
<body>

<div class="container">
  <!-- Modern Header with Toggle Switch -->
  <div class="header-bar">
    <span class="lang-label">DE</span>
    <label class="switch">
      <input type="checkbox" id="langToggle" onchange="toggleLanguage()">
      <span class="slider"></span>
    </label>
    <span class="lang-label">EN</span>
  </div>

  <div class="video-wrapper">
    <canvas id="raceCanvas" width="640" height="480"></canvas>
    <div class="gate-overlay line-v" id="gateLine"></div>
    <div id="hud">
      <span id="statusLight" class="status-light status-idle"></span>
      SENS: <span id="sensDisp">40</span> | <span id="statusTxt" data-i18n="status_ready">BEREIT</span>
    </div>
    <div id="big-timer">0.000</div>
    <div id="countdown">3</div>
  </div>

  <div class="dashboard">
    <div class="stat-box">
      <span class="stat-label" data-i18n="best_lap">Beste Runde</span>
      <span class="stat-value" id="val-best">--.---</span>
    </div>
    <div class="stat-box">
      <span class="stat-label" data-i18n="last_lap">Letzte Runde</span>
      <span class="stat-value" id="val-last">--.---</span>
    </div>
    <div class="stat-box">
      <span class="stat-label" data-i18n="active_laps">Aktive Runden</span>
      <span class="stat-value" id="val-count">0</span>
    </div>
    <div class="stat-box">
      <span class="stat-label" data-i18n="best_triple">Beste 3 Runden</span>
      <span class="stat-value" id="val-triple">--.---</span>
    </div>
  </div>

  <div class="action-bar">
    <button id="btnToggle" class="btn-main" onclick="handleMainAction()" data-i18n="btn_start">START</button>
    <button class="btn-import" onclick="openImportModal()" data-i18n="btn_import">IMPORT</button>
    <button class="btn-accent" onclick="copyToClipboard()" id="btnCopy" data-i18n="btn_copy">KOPIEREN</button>
    <button class="btn-secondary" onclick="exportCSV()">EXPORT (CSV)</button>
    <button class="btn-secondary" style="background:var(--danger); color:white" onclick="clearSession()">RESET</button>
  </div>

  <div class="settings-panel">
    <div class="input-field">
      <label data-i18n="label_camera">KAMERA</label>
      <select id="camSelect" onchange="switchCam(this.value)"></select>
    </div>
    <div class="input-field">
      <label data-i18n="label_sensitivity">SENSITIVITÄT</label>
      <input type="range" min="5" max="250" value="40" id="sensRange" oninput="updateSens(this.value)">
    </div>
    <div class="input-field">
      <label data-i18n="label_direction">FLUG-RICHTUNG</label>
      <select id="dirSelect" onchange="updateGateUI(this.value)">
        <option value="LR" data-i18n="dir_lr">Links ➔ Rechts</option>
        <option value="RL" data-i18n="dir_rl">Rechts ➔ Links</option>
        <option value="TB" data-i18n="dir_tb">Oben ➔ Unten</option>
        <option value="BT" data-i18n="dir_bt">Unten ➔ Oben</option>
      </select>
    </div>
    <div class="input-field">
      <label data-i18n="label_min_lap">MIN. RUNDE (S)</label>
      <input type="number" id="minLap" value="1.5" step="0.5">
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th data-i18n="table_date">DATUM / ZEIT</th>
          <th data-i18n="table_duration">DAUER</th>
          <th data-i18n="table_preview">VORSCHAU</th>
          <th data-i18n="table_status">STATUS</th>
        </tr>
      </thead>
      <tbody id="lapTableBody"></tbody>
    </table>
  </div>
</div>

<div id="importModal">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title" data-i18n="modal_title">Daten importieren</span>
      <button onclick="closeImportModal()" style="min-width:auto; padding:5px; background:transparent; color:var(--text-muted); font-size:20px;">×</button>
    </div>
    <p style="font-size:12px; color:var(--text-muted); margin-bottom:15px;" data-i18n="modal_desc">Füge hier Daten aus einer Tabelle oder einer CSV ein (Runde, Datum, Uhrzeit, Zeit, Status).</p>
    <textarea id="importArea" class="modal-textarea" placeholder=""></textarea>
    <div style="display:flex; gap:10px;">
      <button class="btn-main" onclick="importFromText()" data-i18n="modal_btn_import">IMPORTIEREN</button>
      <button class="btn-secondary" onclick="closeImportModal()" data-i18n="modal_btn_cancel">ABBRECHEN</button>
    </div>
  </div>
</div>

<script>
  // Internationalization
  let currentLang = 'de';
  const translations = {
    de: {
        status_ready: "BEREIT",
        status_armed: "SCHARF",
        status_running: "RENNEN LÄUFT",
        best_lap: "Beste Runde",
        last_lap: "Letzte Runde",
        active_laps: "Aktive Runden",
        best_triple: "Beste 3 Runden",
        btn_start: "START",
        btn_stop: "STOPP",
        btn_import: "IMPORT",
        btn_copy: "KOPIEREN",
        btn_copied: "KOPIERT!",
        label_camera: "KAMERA",
        label_sensitivity: "SENSITIVITÄT",
        label_direction: "FLUG-RICHTUNG",
        label_min_lap: "MIN. RUNDE (S)",
        dir_lr: "Links ➔ Rechts",
        dir_rl: "Rechts ➔ Links",
        dir_tb: "Oben ➔ Unten",
        dir_bt: "Unten ➔ Oben",
        table_date: "DATUM / ZEIT",
        table_duration: "DAUER",
        table_preview: "VORSCHAU",
        table_status: "STATUS",
        modal_title: "Daten importieren",
        modal_desc: "Füge hier Daten aus einer Tabelle oder einer CSV ein (Runde, Datum, Uhrzeit, Zeit, Status).",
        modal_btn_import: "IMPORTIEREN",
        modal_btn_cancel: "ABBRECHEN",
        table_btn_valid: "WERTEN",
        table_btn_combine: "ZUSAMMEN",
        table_status_active: "Aktiv",
        table_status_passive: "Passiv",
        confirm_reset: "Alle Daten löschen?",
        voice_start: "Start",
        voice_record: "Bestzeit! ",
        voice_triple: "Triple Rekord! ",
        voice_point: " komma "
    },
    en: {
        status_ready: "READY",
        status_armed: "ARMED",
        status_running: "RACE RUNNING",
        best_lap: "Best Lap",
        last_lap: "Last Lap",
        active_laps: "Active Laps",
        best_triple: "Best 3 Laps",
        btn_start: "START",
        btn_stop: "STOP",
        btn_import: "IMPORT",
        btn_copy: "COPY",
        btn_copied: "COPIED!",
        label_camera: "CAMERA",
        label_sensitivity: "SENSITIVITY",
        label_direction: "FLIGHT DIRECTION",
        label_min_lap: "MIN. LAP (S)",
        dir_lr: "Left ➔ Right",
        dir_rl: "Right ➔ Left",
        dir_tb: "Top ➔ Bottom",
        dir_bt: "Bottom ➔ Top",
        table_date: "DATE / TIME",
        table_duration: "DURATION",
        table_preview: "PREVIEW",
        table_status: "STATUS",
        modal_title: "Import Data",
        modal_desc: "Paste data from a table or CSV here (Round, Date, Time, Duration, Status).",
        modal_btn_import: "IMPORT",
        modal_btn_cancel: "CANCEL",
        table_btn_valid: "VALID",
        table_btn_combine: "COMBINE",
        table_status_active: "Active",
        table_status_passive: "Passive",
        confirm_reset: "Clear all session data?",
        voice_start: "Start",
        voice_record: "New record! ",
        voice_triple: "Triple record! ",
        voice_point: " point "
    }
  };

  function toggleLanguage() {
    const isChecked = document.getElementById('langToggle').checked;
    currentLang = isChecked ? 'en' : 'de';
    updateLanguageUI();
  }

  function updateLanguageUI() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[currentLang][key]) {
            el.innerText = translations[currentLang][key];
        }
    });
    
    const statusTxt = document.getElementById('statusTxt');
    if (!state.armed && !state.running) statusTxt.innerText = translations[currentLang].status_ready;
    else if (state.armed) statusTxt.innerText = translations[currentLang].status_armed;
    else if (state.running) statusTxt.innerText = translations[currentLang].status_running;

    const btnToggle = document.getElementById('btnToggle');
    btnToggle.innerText = (state.armed || state.running) ? translations[currentLang].btn_stop : translations[currentLang].btn_start;

    recalculateAndUI();
  }

  let state = {
    running: false,
    armed: false,
    lastPassTime: 0,
    bestLap: Infinity,
    bestTriple: Infinity,
    tripleIndices: [], 
    laps: [],
    sensitivity: 40,
    lastFrame: null,
    currentX: null,
    currentY: null,
    prevX: null,
    prevY: null,
    gateStatus: 0, 
    readyTimestamp: 0,
    lockoutUntil: 0,
    preImage: null,
    audioCtx: null
  };

  let wakeLock = null;
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch (err) {
      console.log("WakeLock konnte nicht aktiviert werden:", err);
    }
  }

  // WakeLock erneuern, falls der Nutzer den Tab kurz wechselt und zurückkehrt
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      requestWakeLock();
    }
  });

  const video = document.createElement('video');
  const canvas = document.getElementById('raceCanvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const lapTableBody = document.getElementById('lapTableBody');

  function initAudio() {
    if (!state.audioCtx) {
      state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(freq, duration, type = 'sine', volume = 0.2, delay = 0) {
    initAudio();
    const osc = state.audioCtx.createOscillator();
    const gain = state.audioCtx.createGain();
    const startTime = state.audioCtx.currentTime + delay;
    osc.type = type;
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(volume, startTime);
    gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
    osc.connect(gain);
    gain.connect(state.audioCtx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration);
  }

  function playPassBeep() { playSound(880, 0.1, 'square', 0.15); }
  function playRecordFanfare() {
    const vol = 0.15;
    playSound(523.25, 0.1, 'sine', vol, 0);      
    playSound(659.25, 0.1, 'sine', vol, 0.08);  
    playSound(783.99, 0.15, 'sine', vol, 0.16); 
    playSound(1046.5, 0.25, 'sine', vol, 0.25); 
  }
  function playRaceCountdown(isFinal) {
    if (isFinal) playSound(880, 0.5, 'sine', 0.3);
    else playSound(440, 0.2, 'sine', 0.2);
  }

  async function init() {
    updateSens(state.sensitivity);
    requestWakeLock();
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams = devices.filter(d => d.kind === 'videoinput');
      const select = document.getElementById('camSelect');
      cams.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.deviceId;
        opt.text = c.label || `Kamera ${select.length + 1}`;
        select.appendChild(opt);
      });
      startStream(cams[0]?.deviceId);
    } catch (e) { console.error("Kamerafehler", e); }
    runAnalysisLoop();
    requestAnimationFrame(renderLoop);
  }

  async function startStream(id) {
    if (window.stream) window.stream.getTracks().forEach(t => t.stop());
    const constraints = { video: { deviceId: id ? { exact: id } : undefined, width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 60 } } };
    try {
        window.stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = window.stream; video.setAttribute('playsinline', true); video.play();
    } catch(err) {
        window.stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = window.stream; video.play();
    }
  }

  function switchCam(id) { startStream(id); }
  function updateSens(v) { state.sensitivity = parseInt(v); document.getElementById('sensDisp').innerText = v; }
  function updateGateUI(dir) {
    const gate = document.getElementById('gateLine');
    gate.className = (dir === 'LR' || dir === 'RL') ? 'gate-overlay line-v' : 'gate-overlay line-h';
    resetGateStatus();
  }
  function resetGateStatus() { state.gateStatus = 0; state.readyTimestamp = 0; state.lockoutUntil = 0; state.preImage = null; }

  function handleMainAction() {
    initAudio();
    requestWakeLock(); // Browser fordern oft eine Nutzer-Interaktion für den WakeLock
    if (state.running || state.armed) stopRace();
    else startCountdown();
  }

  function startCountdown() {
    const cd = document.getElementById('countdown');
    cd.style.display = 'flex'; cd.style.color = '#ef4444';
    let count = 3; cd.innerText = count; playRaceCountdown(false);
    const itv = setInterval(() => {
      count--;
      if (count <= 0) {
        clearInterval(itv); playRaceCountdown(true); cd.innerText = "GO!"; cd.style.color = '#10b981';
        setTimeout(() => { cd.style.display = 'none'; }, 500);
        state.armed = true; resetGateStatus();
        updateLanguageUI();
        document.getElementById('statusLight').className = "status-light status-active";
        document.getElementById('btnToggle').className = "btn-stop";
      } else { cd.innerText = count; playRaceCountdown(false); }
    }, 1000);
  }

  function stopRace() {
    state.running = false; state.armed = false; resetGateStatus();
    updateLanguageUI();
    document.getElementById('statusLight').className = "status-light status-idle";
    document.getElementById('btnToggle').className = "btn-main";
    document.getElementById('big-timer').innerText = "0.000";
  }

  function runAnalysisLoop() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) analyzeFrame();
    setTimeout(runAnalysisLoop, 8); 
  }

  function analyzeFrame() {
    ctx.drawImage(video, 0, 0, 640, 480);
    const currentFrameData = ctx.getImageData(0, 0, 640, 480);
    if (state.lastFrame) detectMotion(currentFrameData, state.lastFrame);
    state.lastFrame = currentFrameData;
  }

  function renderLoop() {
    if (state.currentX !== null) drawTriggerHUD(ctx, state.currentX, state.currentY, state.gateStatus, false);
    if (state.running) {
        const elapsed = (performance.now() - state.lastPassTime) / 1000;
        document.getElementById('big-timer').innerText = elapsed.toFixed(3);
    }
    requestAnimationFrame(renderLoop);
  }

  function drawTriggerHUD(targetCtx, x, y, status, isPreview = false) {
    const dir = document.getElementById('dirSelect').value;
    const lineThickness = isPreview ? 5 : 3;
    const markerSize = isPreview ? 22 : 15;
    targetCtx.shadowBlur = 10; targetCtx.shadowColor = '#10b981'; targetCtx.beginPath();
    targetCtx.setLineDash([10, 8]); targetCtx.strokeStyle = '#10b981'; targetCtx.lineWidth = lineThickness;
    if (dir === 'LR' || dir === 'RL') { targetCtx.moveTo(320, 0); targetCtx.lineTo(320, 480); } 
    else { targetCtx.moveTo(0, 240); targetCtx.lineTo(640, 240); }
    targetCtx.stroke(); targetCtx.shadowBlur = 0; targetCtx.setLineDash([]);
    const color = status === 1 ? '#10b981' : (status === -1 ? '#ef4444' : '#f59e0b');
    targetCtx.fillStyle = 'white'; targetCtx.beginPath(); targetCtx.arc(x, y, markerSize + 4, 0, Math.PI * 2); targetCtx.fill();
    targetCtx.fillStyle = color; targetCtx.beginPath(); targetCtx.arc(x, y, markerSize, 0, Math.PI * 2); targetCtx.fill();
    targetCtx.strokeStyle = 'black'; targetCtx.lineWidth = 2; targetCtx.stroke();
  }

  function captureCurrentView(x, y, status) {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = 640; tempCanvas.height = 480;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.drawImage(canvas, 0, 0); drawTriggerHUD(tempCtx, x, y, status, true);
    return tempCanvas.toDataURL('image/jpeg', 0.4);
  }

  function detectMotion(now, prev) {
    const dNow = now.data; const dPrev = prev.data;
    let motionX = 0, motionY = 0, count = 0; const step = 8; 
    for (let y = 0; y < 480; y += step) {
      for (let x = 0; x < 640; x += step) {
        const i = (y * 640 + x) * 4;
        const diff = (Math.abs(dNow[i] - dPrev[i]) + Math.abs(dNow[i+1] - dPrev[i+1]) + Math.abs(dNow[i+2] - dPrev[i+2])) / 3;
        if (diff > 30) { motionX += x; motionY += y; count++; }
      }
    }
    if (count > state.sensitivity) {
      state.prevX = state.currentX; state.prevY = state.currentY;
      state.currentX = motionX / count; state.currentY = motionY / count;
      checkTrigger(state.currentX, state.currentY);
    } else {
      if (performance.now() - state.readyTimestamp > 150) { state.currentX = null; state.currentY = null; state.gateStatus = 0; state.preImage = null; }
    }
  }

  function checkTrigger(x, y) {
    if (!state.armed && !state.running) return;
    const now = performance.now();
    if (now < state.lockoutUntil) return;
    const dir = document.getElementById('dirSelect').value;
    const minS = parseFloat(document.getElementById('minLap').value) * 1000;
    const midX = 320, midY = 240;
    let inPreZone = false, inPostZone = false, vectorCorrect = false;
    if (dir === 'LR') { inPreZone = (x < midX + 15); inPostZone = (x > midX - 15); if (state.prevX !== null) vectorCorrect = (x > state.prevX + 1); } 
    else if (dir === 'RL') { inPreZone = (x > midX - 15); inPostZone = (x < midX + 15); if (state.prevX !== null) vectorCorrect = (x < state.prevX - 1); } 
    else if (dir === 'TB') { inPreZone = (y < midY + 15); inPostZone = (y > midY - 15); if (state.prevY !== null) vectorCorrect = (y > state.prevY + 1); } 
    else if (dir === 'BT') { inPreZone = (y > midY - 15); inPostZone = (y < midY + 15); if (state.prevY !== null) vectorCorrect = (y < state.prevY - 1); }
    if (inPreZone && !inPostZone) { if (state.gateStatus !== 1) state.preImage = captureCurrentView(x, y, 1); state.gateStatus = 1; state.readyTimestamp = now; }
    if (inPostZone) {
      const wasReady = (state.gateStatus === 1 && (now - state.readyTimestamp < 150));
      if (wasReady) {
        let finalTrigger = vectorCorrect;
        if (!finalTrigger) {
          if (dir === 'LR' && x > midX + 10) finalTrigger = true; if (dir === 'RL' && x < midX - 10) finalTrigger = true;
          if (dir === 'TB' && y > midY + 10) finalTrigger = true; if (dir === 'BT' && y < midY - 10) finalTrigger = true;
        }
        if (finalTrigger && (now - state.lastPassTime > minS)) { handlePass(now, x, y); state.lockoutUntil = now + 800; state.gateStatus = 0; }
      } else if (state.gateStatus === 0 && !inPreZone) state.gateStatus = -1;
    }
  }

  function handlePass(now, triggerX, triggerY) {
    const postImage = captureCurrentView(triggerX, triggerY, 1);
    const preImage = state.preImage || postImage;
    if (state.armed) {
      playPassBeep(); state.armed = false; state.running = true; state.lastPassTime = now;
      updateLanguageUI();
      announce(translations[currentLang].voice_start); return;
    }
    const lapTime = (now - state.lastPassTime) / 1000;
    state.lastPassTime = now;
    const oldBestLap = state.bestLap; const oldBestTriple = state.bestTriple; const fullDate = new Date();
    const lapData = { 
        id: Date.now(), rawTime: lapTime, active: true, 
        date: fullDate.toLocaleDateString(currentLang === 'de' ? 'de-DE' : 'en-US'), 
        timestamp: fullDate.toLocaleTimeString(currentLang === 'de' ? 'de-DE' : 'en-US'), 
        preImg: preImage, postImg: postImage 
    };
    state.laps.push(lapData);
    recalculateAndUI();
    const isNewLapRecord = state.bestLap < oldBestLap && state.bestLap !== Infinity;
    const isNewTripleRecord = state.bestTriple < oldBestTriple && state.bestTriple !== Infinity;
    const activeLaps = state.laps.filter(l => l.active);
    const displayTime = activeLaps[activeLaps.length - 1]?.displayTime || lapTime;
    if (isNewLapRecord || isNewTripleRecord) playRecordFanfare(); else playPassBeep();
    setTimeout(() => {
        let voiceMsg = ""; 
        if (isNewLapRecord) voiceMsg += translations[currentLang].voice_record; 
        if (isNewTripleRecord) voiceMsg += translations[currentLang].voice_triple;
        voiceMsg += displayTime.toFixed(2).replace('.', translations[currentLang].voice_point); 
        announce(voiceMsg);
    }, 450); 
  }

  function announce(txt) {
    if (!txt) return; window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(txt.toString()); 
    msg.lang = currentLang === 'de' ? 'de-DE' : 'en-US'; 
    msg.rate = 2.1; msg.volume = 1.0; window.speechSynthesis.speak(msg);
  }

  function toggleLap(lapId) {
    const lap = state.laps.find(l => l.id === lapId);
    if (lap) { lap.active = !lap.active; recalculateAndUI(); }
  }

  function recalculateAndUI() {
    let carryOver = 0; const activeLaps = [];
    state.laps.forEach(lap => {
      lap.displayTime = lap.rawTime + carryOver;
      if (lap.active) { activeLaps.push(lap); carryOver = 0; } else { carryOver = lap.displayTime; }
    });
    if (activeLaps.length === 0) { state.bestLap = Infinity; state.bestTriple = Infinity; state.tripleIndices = []; } 
    else {
      state.bestLap = Math.min(...activeLaps.map(l => l.displayTime)); state.bestTriple = Infinity; state.tripleIndices = [];
      if (activeLaps.length >= 3) {
        for (let i = 0; i <= activeLaps.length - 3; i++) {
          const sum = activeLaps[i].displayTime + activeLaps[i+1].displayTime + activeLaps[i+2].displayTime;
          if (sum < state.bestTriple) { state.bestTriple = sum; state.tripleIndices = [activeLaps[i].id, activeLaps[i+1].id, activeLaps[i+2].id]; }
        }
      }
    }
    updateUI(activeLaps.length);
  }

  function updateUI(activeCount) {
    document.getElementById('val-count').innerText = activeCount;
    const activeOnly = state.laps.filter(l => l.active);
    if (activeOnly.length > 0) {
      document.getElementById('val-last').innerText = activeOnly[activeOnly.length-1].displayTime.toFixed(3);
      document.getElementById('val-best').innerText = state.bestLap === Infinity ? '--.---' : state.bestLap.toFixed(3);
    } else { document.getElementById('val-last').innerText = '--.---'; document.getElementById('val-best').innerText = '--.---'; }
    document.getElementById('val-triple').innerText = state.bestTriple === Infinity ? '--.---' : state.bestTriple.toFixed(3);
    lapTableBody.innerHTML = "";
    
    const btnValidTxt = translations[currentLang].table_btn_valid;
    const btnCombineTxt = translations[currentLang].table_btn_combine;

    [...state.laps].reverse().forEach((l) => {
        const row = document.createElement('tr');
        const isTriple = state.tripleIndices.includes(l.id);
        const isBest = l.active && l.displayTime === state.bestLap;
        if (!l.active) row.style.opacity = "0.4"; else if (isTriple) row.style.background = "var(--highlight)";
        row.innerHTML = `<td>${state.laps.indexOf(l) + 1}</td><td><span style="font-size:10px; color:var(--text-muted)">${l.date}</span><br>${l.timestamp}</td>
          <td class="${isBest ? 'lap-record' : ''}">${isBest ? '<i class="crown-icon">👑</i>' : ''}${l.active ? l.displayTime.toFixed(3) + 's' : '<span style="color:var(--danger)">KOMBI</span>'}</td>
          <td><div class="img-pair"><div class="img-container"><span class="img-label">IN</span>${l.preImg ? `<img src="${l.preImg}" class="img-preview">` : '<div class="img-preview"></div>'}</div>
          <div class="img-container"><span class="img-label">OUT</span>${l.postImg ? `<img src="${l.postImg}" class="img-preview">` : '<div class="img-preview"></div>'}</div></div></td>
          <td><button class="btn-toggle-lap ${l.active ? 'active' : 'inactive'}" onclick="toggleLap(${l.id})">${l.active ? btnValidTxt : btnCombineTxt}</button></td>`;
        lapTableBody.appendChild(row);
    });
  }

  function openImportModal() { document.getElementById('importModal').style.display = 'flex'; document.getElementById('importArea').focus(); }
  function closeImportModal() { document.getElementById('importModal').style.display = 'none'; document.getElementById('importArea').value = ""; }

  function importFromText() {
    const text = document.getElementById('importArea').value;
    if (!text) return;
    const lines = text.split('\n'); let importedCount = 0;
    lines.forEach(line => {
      const parts = line.split(/\t|;/);
      if (parts.length >= 4) {
        const date = parts[1].trim(); const timeStr = parts[2].trim();
        const rawLap = parseFloat(parts[3].replace(',', '.'));
        const status = parts[4] ? parts[4].toLowerCase() : 'aktiv';
        const isActive = status.includes('aktiv') || status.includes('werten') || status.includes('active') || status.includes('valid');
        if (!isNaN(rawLap)) {
          state.laps.push({ id: Date.now() + importedCount, rawTime: rawLap, displayTime: rawLap, active: isActive, date: date || new Date().toLocaleDateString('de-DE'), timestamp: timeStr || new Date().toLocaleTimeString('de-DE'), preImg: null, postImg: null });
          importedCount++;
        }
      }
    });
    if (importedCount > 0) { recalculateAndUI(); closeImportModal(); }
  }

  function clearSession() { if(confirm(translations[currentLang].confirm_reset)) { state.laps = []; state.bestLap = Infinity; state.bestTriple = Infinity; lapTableBody.innerHTML = ''; state.lastPassTime = 0; recalculateAndUI(); stopRace(); } }
  
  function copyToClipboard() {
    const activeLaps = state.laps.filter(l => l.active);
    let tableData = currentLang === 'de' ? "Runde\tDatum\tUhrzeit\tRundenzeit (s)\tStatus\n" : "Round\tDate\tTime\tLaptime (s)\tStatus\n";
    
    activeLaps.forEach((l, i) => { 
        const statusLabel = translations[currentLang].table_status_active;
        let timeStr = l.displayTime.toFixed(3);
        if (currentLang === 'de') timeStr = timeStr.replace('.', ',');
        tableData += `${i+1}\t${l.date}\t${l.timestamp}\t${timeStr}\t${statusLabel}\n`; 
    });
    
    navigator.clipboard.writeText(tableData).then(() => {
        const btn = document.getElementById('btnCopy'); 
        const oldTxt = translations[currentLang].btn_copy;
        btn.innerText = translations[currentLang].btn_copied; 
        setTimeout(() => btn.innerText = oldTxt, 1500);
    });
  }

  function exportCSV() {
    const activeLaps = state.laps.filter(l => l.active);
    if (activeLaps.length === 0) return;
    
    let csvHeader = currentLang === 'de' ? "Runde;Datum;Uhrzeit;Rundenzeit (s);Status" : "Round;Date;Time;Laptime (s);Status";
    let csvContent = "\uFEFF" + csvHeader + "\n";
    
    activeLaps.forEach((l, i) => { 
        const statusLabel = translations[currentLang].table_status_active;
        let timeStr = l.displayTime.toFixed(3);
        if (currentLang === 'de') timeStr = timeStr.replace('.', ',');
        csvContent += `${i+1};${l.date};${l.timestamp};${timeStr};${statusLabel}\n`; 
    });
    
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `FPV_Race_${new Date().toISOString().slice(0,10)}.csv`; link.click();
  }

  init();
</script>
