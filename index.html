<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPV Pro Race Timer - Professional Edition</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f0f2f5;
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: auto;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 25px;
    }
    .video-container {
      position: relative;
      background: #000;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      aspect-ratio: 4 / 3;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    button {
      transition: all 0.2s ease;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    button:active {
      transform: scale(0.96);
    }
    .stat-card {
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      flex: 1;
    }
    .motion-meter-container {
      height: 6px;
      background: #eee;
      width: 100%;
      margin-top: 10px;
      border-radius: 3px;
      overflow: hidden;
    }
    #motionMeter {
      height: 100%;
      width: 0%;
      background: #28a745;
      transition: width 0.1s;
    }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin: 25px 0;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    input, select {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ced4da;
      background: #fff;
      font-weight: bold;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
    }
    .lang-switch {
      background: #e9ecef;
      border-radius: 20px;
      padding: 5px;
      display: flex;
      gap: 5px;
    }
    .lang-btn {
      border: none;
      padding: 5px 12px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 12px;
      background: transparent;
      color: #666;
    }
    .lang-btn.active {
      background: #fff;
      color: #000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 style="margin: 0; color: #1a1a1a;" data-i18n="title">🏁 FPV Pro Race Timer</h2>
      <div style="display: flex; align-items: center; gap: 15px;">
        <div class="lang-switch">
          <button id="lang-de" class="lang-btn active" onclick="setLanguage('de')">DE</button>
          <button id="lang-en" class="lang-btn" onclick="setLanguage('en')">EN</button>
        </div>
        <div id="connectionStatus" style="font-size: 12px; color: #28a745;" data-i18n="cam_active">● Kamera Aktiv</div>
      </div>
    </div>

    <div class="video-container">
      <canvas id="canvasElement" width="640" height="480"></canvas>
      <video id="videoElement" style="display: none;"></video>
      
      <div id="countdownOverlay" style="display: none; position: absolute; top:0; left:0; width:100%; height:100%; align-items:center; justify-content:center; background:rgba(0,0,0,0.7); color:#fff; font-size:140px; font-weight:bold; z-index: 10;">
        <span id="countdownValue">3</span>
      </div>

      <div id="waitingOverlay" style="display: none; position: absolute; top:0; left:0; width:100%; height:100%; align-items:center; justify-content:center; background:rgba(40,167,69,0.3); color:#fff; font-size:32px; font-weight:bold; text-align: center; z-index: 5; pointer-events: none;">
        <div style="text-shadow: 0 2px 10px rgba(0,0,0,0.5);">
          <span data-i18n="armed">SCHARF GESCHALTET</span><br>
          <span style="font-size: 18px; font-weight: normal;" data-i18n="start_trigger">Start bei erstem Durchflug</span>
        </div>
      </div>
    </div>

    <div class="motion-meter-container" title="Bewegungs-Intensität">
      <div id="motionMeter"></div>
    </div>

    <div class="settings-grid">
      <div class="input-group">
        <label style="font-size: 12px; color: #666; font-weight: bold;" data-i18n="direction">RICHTUNG</label>
        <select id="directionSelect" onchange="updateDirection(this.value)">
          <optgroup label="Horizontal" data-label-i18n="horizontal">
            <option value="L->R">L ➔ R</option>
            <option value="R->L">R ⬅ L</option>
          </optgroup>
          <optgroup label="Vertikal" data-label-i18n="vertical">
            <option value="O->U">Oben ➔ Unten</option>
            <option value="U->O">Unten ⬅ Oben</option>
          </optgroup>
        </select>
      </div>
      <div class="input-group">
        <label style="font-size: 12px; color: #666; font-weight: bold;" data-i18n="min_lap">MIN. RUNDENZEIT (S)</label>
        <input type="number" id="minLapTimeInput" value="1.5" step="0.1" min="0.1">
      </div>
      <button id="startBtn" onclick="startCountdown()" style="padding:12px; background:#28a745; color:white; border:none; border-radius:10px; cursor:pointer; font-size: 16px; align-self: end;" data-i18n="btn_start">
        START RENNEN
      </button>
      <button id="stopBtn" onclick="stopRace()" style="display: none; padding:12px; background:#dc3545; color:white; border:none; border-radius:10px; cursor:pointer; font-size: 16px; align-self: end;" data-i18n="btn_stop">
        STOPP / PAUSE
      </button>
    </div>

    <div style="display: flex; gap: 15px; margin-bottom: 25px;">
      <div class="stat-card" style="border-left: 5px solid #ffc107;">
        <small style="text-transform: uppercase; font-size: 11px; color: #666;" data-i18n="fastest_lap">Schnellste Runde</small><br>
        <strong id="bestLapDisplay" style="font-size: 24px;">---</strong>
      </div>
      <div class="stat-card" style="border-left: 5px solid #17a2b8; background: #fff3cd;">
        <small style="text-transform: uppercase; font-size: 11px; color: #856404;" data-i18n="best_triple">Bestes Triple (3)</small><br>
        <strong id="bestTripleSum" style="font-size: 24px; color: #856404;">---</strong>
      </div>
      <div style="display: flex; flex-direction: column; gap: 5px;">
        <div style="display: flex; gap: 5px;">
          <button onclick="copyData()" style="flex:1; padding: 12px; background: #6c757d; color: white; border: none; border-radius: 8px; cursor: pointer; white-space: nowrap;" data-i18n="btn_copy">📋 Kopieren</button>
          <button onclick="showImportModal()" style="flex:1; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; white-space: nowrap;" data-i18n="btn_import">📥 Import</button>
        </div>
        <button id="clearBtn" onclick="clearSession()" style="padding: 12px 20px; background: #eee; color: #333; border: 1px solid #ddd; border-radius: 8px; cursor: pointer;" data-i18n="btn_clear">🗑️ Liste Leeren</button>
      </div>
    </div>

    <div style="background: white; border-radius: 12px; border: 1px solid #e9ecef; overflow: hidden;">
      <table style="width: 100%; border-collapse: collapse;">
        <thead>
          <tr style="text-align: left; background: #f8f9fa; border-bottom: 2px solid #dee2e6;">
            <th style="padding: 12px 15px;">#</th>
            <th data-i18n="col_time">Uhrzeit</th>
            <th data-i18n="col_lap">Rundenzeit</th>
            <th data-i18n="col_snaps">Snapshots</th>
            <th style="text-align: center;" data-i18n="col_action">Aktion</th>
          </tr>
        </thead>
        <tbody id="lapsTableBody"></tbody>
      </table>
    </div>
  </div>

  <div id="importModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-top:0" data-i18n="import_title">Runden importieren</h3>
      <p style="font-size: 13px; color: #666;" data-i18n="import_desc">Füge hier die kopierten Daten ein (z.B. aus der Zwischenablage oder Excel). Format: Zeit oder Zeitstempel + Zeit.</p>
      <textarea id="importArea" style="width:100%; height:150px; border-radius:8px; border:1px solid #ddd; padding:10px; font-family: monospace;" placeholder="Beispiel:&#10;12:05:01 2,45&#10;12:05:04 2,10"></textarea>
      <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button onclick="processImport()" style="flex:1; padding:12px; background:#28a745; color:white; border:none; border-radius:8px;" data-i18n="btn_process_import">Importieren</button>
        <button onclick="hideImportModal()" style="flex:1; padding:12px; background:#eee; border:none; border-radius:8px;" data-i18n="btn_cancel">Abbrechen</button>
      </div>
    </div>
  </div>

  <script>
    const i18n = {
      de: {
        title: "🏁 FPV Pro Race Timer",
        cam_active: "● Kamera Aktiv",
        armed: "SCHARF GESCHALTET",
        start_trigger: "Start bei erstem Durchflug",
        direction: "RICHTUNG",
        horizontal: "Horizontal",
        vertical: "Vertikal",
        min_lap: "MIN. RUNDENZEIT (S)",
        btn_start: "START RENNEN",
        btn_stop: "STOPP / PAUSE",
        fastest_lap: "Schnellste Runde",
        best_triple: "Bestes Triple (3)",
        btn_copy: "📋 Kopieren",
        btn_import: "📥 Import",
        btn_clear: "🗑️ Liste Leeren",
        col_time: "Uhrzeit",
        col_lap: "Rundenzeit",
        col_snaps: "Snapshots",
        col_action: "Aktion",
        import_title: "Runden importieren",
        import_desc: "Füge hier die kopierten Daten ein (z.B. aus der Zwischenablage oder Excel). Format: Zeit oder Zeitstempel + Zeit.",
        btn_process_import: "Importieren",
        btn_cancel: "Abbrechen",
        confirm_clear: "Möchten Sie wirklich die gesamte Liste und alle Rekorde löschen?",
        msg_cleared: "Liste wurde vollständig geleert",
        msg_race_started: "Rennen läuft",
        msg_armed: "Scharf geschaltet",
        msg_stopped: "Rennen gestoppt",
        msg_new_lap_record: "Neuer Rundenrekord",
        msg_new_triple: "Neuer Triple Rekord",
        msg_imported: " Runden importiert",
        copy_success: "Kopiert!",
        btn_remove: "Entfernen",
        btn_activate: "Aktivieren",
        no_image: "Kein Bild",
        three: "Drei",
        two: "Zwei",
        one: "Eins"
      },
      en: {
        title: "🏁 FPV Pro Race Timer",
        cam_active: "● Camera Active",
        armed: "ARMED",
        start_trigger: "Starts on first pass",
        direction: "DIRECTION",
        horizontal: "Horizontal",
        vertical: "Vertical",
        min_lap: "MIN LAP TIME (S)",
        btn_start: "START RACE",
        btn_stop: "STOP / PAUSE",
        fastest_lap: "Fastest Lap",
        best_triple: "Best Triple (3)",
        btn_copy: "📋 Copy Data",
        btn_import: "📥 Import",
        btn_clear: "🗑️ Clear List",
        col_time: "Time",
        col_lap: "Lap Time",
        col_snaps: "Snapshots",
        col_action: "Action",
        import_title: "Import Laps",
        import_desc: "Paste copied data here (e.g. from clipboard or Excel). Format: Timestamp + Time or just Time.",
        btn_process_import: "Import Now",
        btn_cancel: "Cancel",
        confirm_clear: "Do you really want to clear all laps and records?",
        msg_cleared: "List has been fully cleared",
        msg_race_started: "Race started",
        msg_armed: "Armed",
        msg_stopped: "Race stopped",
        msg_new_lap_record: "New lap record",
        msg_new_triple: "New triple record",
        msg_imported: " laps imported",
        copy_success: "Copied!",
        btn_remove: "Remove",
        btn_activate: "Activate",
        no_image: "No image",
        three: "Three",
        two: "Two",
        one: "One"
      }
    };

    let currentLang = 'de';

    function setLanguage(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('lang-' + lang).classList.add('active');
      document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = i18n[lang][el.getAttribute('data-i18n')]; });
      document.querySelectorAll('[data-label-i18n]').forEach(el => { el.label = i18n[lang][el.getAttribute('data-label-i18n')]; });
      updateUI();
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq = 880, duration = 0.1) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    let confirmedLaps = [];
    let selectedDirection = 'L->R';
    let lastCentroidX = null, currentCentroidX = null;
    let lastCentroidY = null, currentCentroidY = null;
    let lastGrayscaleData = null; 
    let lastFrameSnapshot = ""; 
    let firstTriggerTimestamp = 0; 
    let lastCrossingTime = 0;
    let isRaceRunning = false, isCountingDown = false, isWaitingForFirstPass = false;
    let countdownValue = 3;
    let sessionBestTriple = Infinity;
    let sessionBestLap = Infinity;
    let triggerVisualTimeout = null;
    let lastMotionTime = 0;

    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasElement');
    const motionMeter = document.getElementById('motionMeter');
    const lapsTableBody = document.getElementById('lapsTableBody');
    const bestTripleSumEl = document.getElementById('bestTripleSum');
    const bestLapDisplay = document.getElementById('bestLapDisplay');
    const minLapTimeInput = document.getElementById('minLapTimeInput');

    document.addEventListener('DOMContentLoaded', () => {
      setupCamera();
      loadFromStorage();
      setLanguage('de');
    });

    async function setupCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, frameRate: { ideal: 30 } } });
        video.srcObject = stream; video.play();
        runDetectionLoop();
      } catch (err) { console.error("Camera error", err); }
    }

    function runDetectionLoop() {
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      const loop = () => {
        if (ctx) {
          ctx.drawImage(video, 0, 0, 640, 480);
          let lineColor = (triggerVisualTimeout) ? 'rgba(40, 167, 69, 0.8)' : 'rgba(255, 0, 0, 0.5)';
          ctx.lineWidth = (triggerVisualTimeout) ? 6 : 2;
          
          if (selectedDirection.includes('L') || selectedDirection.includes('R')) {
            ctx.strokeStyle = lineColor; ctx.beginPath(); ctx.moveTo(320, 0); ctx.lineTo(320, 480); ctx.stroke();
          } else {
            ctx.strokeStyle = lineColor; ctx.beginPath(); ctx.moveTo(0, 240); ctx.lineTo(640, 240); ctx.stroke();
          }
          
          const now = Date.now();
          if (now - lastMotionTime > 200) { lastCentroidX = lastCentroidY = currentCentroidX = currentCentroidY = null; }
          if ((isRaceRunning || isWaitingForFirstPass) && currentCentroidX !== null) {
            ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(currentCentroidX, currentCentroidY, 8, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
          }
          analyze(ctx.getImageData(0, 0, 640, 480));
        }
        requestAnimationFrame(loop);
      };
      loop();
    }

    function analyze(imageData) {
      const data = imageData.data;
      const gray = new Uint8Array(640 * 480);
      for (let i = 0; i < data.length; i += 4) {
        gray[i / 4] = (data[i] * 0.3) + (data[i+1] * 0.59) + (data[i+2] * 0.11);
      }
      if (!lastGrayscaleData) { lastGrayscaleData = gray; return; }
      
      let sumX = 0, sumY = 0, diffCount = 0;
      const step = 8;
      for (let y = 0; y < 480; y += step) {
        for (let x = 0; x < 640; x += step) {
          const idx = y * 640 + x;
          if (Math.abs(gray[idx] - lastGrayscaleData[idx]) > 40) { sumX += x; sumY += y; diffCount++; }
        }
      }

      const intensity = Math.min(100, (diffCount / 180) * 100);
      motionMeter.style.width = intensity + "%";
      motionMeter.style.background = intensity > 50 ? '#dc3545' : '#28a745';

      if (diffCount > 12) {
        lastMotionTime = Date.now();
        const newX = sumX / diffCount;
        const newY = sumY / diffCount;
        if (currentCentroidX === null) { lastCentroidX = newX; lastCentroidY = newY; } 
        else { lastCentroidX = currentCentroidX; lastCentroidY = currentCentroidY; }
        currentCentroidX = newX; currentCentroidY = newY;

        if (isRaceRunning || isWaitingForFirstPass) {
          let triggered = false;
          if (lastCentroidX !== null) {
            // Richtungserkennung
            if (selectedDirection === 'L->R') triggered = lastCentroidX < 320 && currentCentroidX >= 320;
            if (selectedDirection === 'R->L') triggered = lastCentroidX > 320 && currentCentroidX <= 320;
            if (selectedDirection === 'O->U') triggered = lastCentroidY < 240 && currentCentroidY >= 240;
            if (selectedDirection === 'U->O') triggered = lastCentroidY > 240 && currentCentroidY <= 240;
          }
          if (triggered) handlePassDetected();
        }
      }
      if (diffCount > 5) lastFrameSnapshot = canvas.toDataURL('image/jpeg', 0.15);
      lastGrayscaleData = gray;
    }

    function handlePassDetected() {
      const now = Date.now();
      const minGap = parseFloat(minLapTimeInput.value || 1.5) * 1000;
      
      // Für den allerersten Start gibt es keinen minGap (da lastCrossingTime 0 ist)
      if (lastCrossingTime !== 0 && (now - lastCrossingTime < minGap)) return;

      playBeep(1200, 0.15);
      triggerVisualTimeout = setTimeout(() => triggerVisualTimeout = null, 400);

      if (isWaitingForFirstPass) {
        firstTriggerTimestamp = now;
        isWaitingForFirstPass = false; isRaceRunning = true;
        speakText(i18n[currentLang].msg_race_started);
      } else {
        const lapTime = (now - lastCrossingTime) / 1000;
        confirmedLaps.push({ 
          time: lapTime, timestamp: now, 
          readableTime: new Date().toLocaleTimeString(currentLang === 'de' ? 'de-DE' : 'en-US'),
          active: true, snapshots: [lastFrameSnapshot, canvas.toDataURL('image/jpeg', 0.15)]
        });
        speakText(lapTime.toFixed(2).replace('.', currentLang === 'de' ? ',' : '.'));
        if (lapTime < sessionBestLap) {
          sessionBestLap = lapTime;
          setTimeout(() => { playBeep(1500, 0.3); speakText(i18n[currentLang].msg_new_lap_record); }, 800);
        }
        checkNewTripleRecord();
      }
      lastCrossingTime = now;
      saveToStorage(); updateUI();
    }

    function checkNewTripleRecord() {
      const active = confirmedLaps.filter(l => l.active);
      if (active.length >= 3) {
        const sum = active.slice(-3).reduce((a, b) => a + b.time, 0);
        if (sum < sessionBestTriple) {
          sessionBestTriple = sum;
          setTimeout(() => speakText(i18n[currentLang].msg_new_triple + " " + sum.toFixed(2).replace('.', currentLang === 'de' ? ',' : '.')), 2000);
        }
      }
    }

    function updateDirection(v) { 
      selectedDirection = v; 
      // Reset centroids on direction change to prevent false triggers
      lastCentroidX = currentCentroidX = lastCentroidY = currentCentroidY = null;
    }

    function toggleLap(idx) {
      confirmedLaps[idx].active = !confirmedLaps[idx].active;
      recalculateLaps(); updateUI(); saveToStorage();
    }

    function recalculateLaps() {
      let prev = firstTriggerTimestamp;
      confirmedLaps.forEach(l => {
        if (l.active) { 
            if (l.isImported) { prev = l.timestamp; } 
            else { l.time = (l.timestamp - prev) / 1000; prev = l.timestamp; }
        } else { l.time = 0; }
      });
      const active = confirmedLaps.filter(l => l.active);
      sessionBestLap = active.length ? Math.min(...active.map(l => l.time)) : Infinity;
      const triple = getBestTripleInfo();
      sessionBestTriple = triple ? parseFloat(triple.sum) : Infinity;
    }

    function startCountdown() {
      if (isCountingDown) return;
      isCountingDown = true; countdownValue = 3; 
      speakText(i18n[currentLang].three);
      updateUI();
      const itv = setInterval(() => {
        countdownValue--;
        if (countdownValue === 2) speakText(i18n[currentLang].two);
        if (countdownValue === 1) speakText(i18n[currentLang].one);
        if (countdownValue > 0) { updateUI(); }
        else { 
          clearInterval(itv); 
          speakText(i18n[currentLang].msg_armed); 
          isCountingDown = false; isWaitingForFirstPass = true; updateUI(); 
        }
      }, 1000);
    }

    function stopRace() {
      isRaceRunning = isWaitingForFirstPass = false;
      speakText(i18n[currentLang].msg_stopped);
      updateUI();
    }

    function speakText(t) {
      const m = new SpeechSynthesisUtterance(t);
      m.lang = currentLang === 'de' ? 'de-DE' : 'en-US';
      m.rate = 1.1; window.speechSynthesis.speak(m);
    }

    function getBestTripleInfo() {
      const active = confirmedLaps.map((l, i) => ({...l, i})).filter(l => l.active);
      if (active.length < 3) return null;
      let min = Infinity, start = -1;
      for (let i = 0; i <= active.length - 3; i++) {
        const s = active[i].time + active[i+1].time + active[i+2].time;
        if (s < min) { min = s; start = active[i].i; }
      }
      return start === -1 ? null : { sum: min.toFixed(2), startIndex: start };
    }

    function copyData() {
      const headers = currentLang === 'de' ? "Uhrzeit\tRundenzeit\n" : "Time\tLap Time\n";
      let t = headers;
      confirmedLaps.filter(l => l.active).forEach(l => t += `${l.readableTime}\t${l.time.toFixed(2).replace('.', ',')}s\n`);
      navigator.clipboard.writeText(t).then(() => alert(i18n[currentLang].copy_success));
    }

    function showImportModal() { document.getElementById('importModal').style.display = 'flex'; }
    function hideImportModal() { document.getElementById('importModal').style.display = 'none'; }
    
    function processImport() {
      const text = document.getElementById('importArea').value;
      const lines = text.split('\n');
      let added = 0;
      lines.forEach(line => {
        const clean = line.replace(',', '.').trim();
        const parts = clean.split(/\s+/);
        const timeVal = parseFloat(parts[parts.length - 1]);
        if (!isNaN(timeVal)) {
          confirmedLaps.push({ time: timeVal, timestamp: Date.now() + added, readableTime: parts.length > 1 ? parts[0] : (currentLang === 'de' ? "Import" : "Imported"), active: true, isImported: true, snapshots: ["", ""] });
          added++;
        }
      });
      if (added > 0) { recalculateLaps(); saveToStorage(); updateUI(); hideImportModal(); speakText(added + i18n[currentLang].msg_imported); }
    }

    function clearSession() {
      if (confirm(i18n[currentLang].confirm_clear)) {
        isRaceRunning = isWaitingForFirstPass = isCountingDown = false;
        confirmedLaps = []; sessionBestLap = sessionBestTriple = Infinity;
        firstTriggerTimestamp = lastCrossingTime = 0;
        localStorage.removeItem('fpv_timer_data');
        bestTripleSumEl.innerText = '---'; bestLapDisplay.innerText = '---'; lapsTableBody.innerHTML = '';
        updateUI(); speakText(i18n[currentLang].msg_cleared);
      }
    }

    function saveToStorage() { localStorage.setItem('fpv_timer_data', JSON.stringify({ laps: confirmedLaps, first: firstTriggerTimestamp })); }
    function loadFromStorage() {
      const raw = localStorage.getItem('fpv_timer_data');
      if (raw) {
        const d = JSON.parse(raw);
        confirmedLaps = d.laps || []; firstTriggerTimestamp = d.first || 0;
        recalculateLaps();
      }
    }

    function updateUI() {
      document.getElementById('countdownOverlay').style.display = isCountingDown ? 'flex' : 'none';
      document.getElementById('countdownValue').innerText = countdownValue;
      document.getElementById('waitingOverlay').style.display = isWaitingForFirstPass ? 'flex' : 'none';
      document.getElementById('startBtn').style.display = (isRaceRunning || isWaitingForFirstPass || isCountingDown) ? 'none' : 'block';
      document.getElementById('stopBtn').style.display = (isRaceRunning || isWaitingForFirstPass || isCountingDown) ? 'block' : 'none';

      const triple = getBestTripleInfo();
      bestTripleSumEl.innerText = triple ? triple.sum + 's' : '---';
      bestLapDisplay.innerText = sessionBestLap === Infinity ? '---' : sessionBestLap.toFixed(2) + 's';

      lapsTableBody.innerHTML = '';
      if (confirmedLaps.length === 0) return;

      let tripleIndices = [];
      if (triple) {
        const active = confirmedLaps.map((l, idx) => ({...l, idx})).filter(l => l.active);
        const startIdx = active.findIndex(l => l.idx === triple.startIndex);
        if (startIdx !== -1) tripleIndices = active.slice(startIdx, startIdx + 3).map(l => l.idx);
      }

      confirmedLaps.forEach((l, i) => {
        const isTriple = tripleIndices.includes(i);
        const isBest = l.active && l.time === sessionBestLap;
        const tr = document.createElement('tr');
        tr.style.background = isTriple ? '#fff3cd' : (l.active ? 'transparent' : '#f8f9fa');
        tr.style.opacity = l.active ? '1' : '0.5';
        tr.innerHTML = `
          <td style="padding:15px;">${isTriple ? '★' : ''}${isBest ? '🏆' : ''}${i+1}</td>
          <td>${l.readableTime}</td>
          <td style="font-size:18px; font-weight:${isBest?'bold':'normal'}">${l.active ? l.time.toFixed(2)+'s' : '---'}</td>
          <td>
            ${l.snapshots[0] ? `<img src="${l.snapshots[0]}" width="60" height="45">` : `<span style="color:#ccc; font-size:10px">${i18n[currentLang].no_image}</span>`} 
            ${l.snapshots[1] ? `<img src="${l.snapshots[1]}" width="60" height="45" style="border:1px solid green">` : ''}
          </td>
          <td style="text-align:center">
            <button onclick="toggleLap(${i})" style="padding:5px 10px; border-radius:5px; border:none; background:#6c757d; color:white;">
              ${l.active ? i18n[currentLang].btn_remove : i18n[currentLang].btn_activate}
            </button>
          </td>
        `;
        lapsTableBody.appendChild(tr);
      });
    }
  </script>
</body>
</html>
