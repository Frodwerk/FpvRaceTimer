<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPV Pro Race Timer - V4.5 (Record Voice)</title>
  <style>
    :root {
      --primary: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --highlight: rgba(245, 158, 11, 0.15);
      --highlight-border: rgba(245, 158, 11, 0.5);
      --crown-color: #ffd700;
    }

    body {
      margin: 0;
      padding: 10px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .container {
      max-width: 950px;
      margin: auto;
      background: var(--card-bg);
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .video-wrapper {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      width: 100%;
    }

    canvas { width: 100%; height: 100%; display: block; }

    .gate-overlay {
      position: absolute;
      pointer-events: none;
      z-index: 5;
    }

    .line-v { top: 0; left: 50%; width: 2px; height: 100%; border-left: 2px dashed rgba(16, 185, 129, 0.8); transform: translateX(-50%); }
    .line-h { top: 50%; left: 0; width: 100%; height: 2px; border-top: 2px dashed rgba(16, 185, 129, 0.8); transform: translateY(-50%); }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 15px 0;
    }

    @media (min-width: 640px) {
      .dashboard { grid-template-columns: repeat(4, 1fr); }
    }

    .stat-box {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 18px; font-weight: 700; display: block; margin-top: 4px; }

    .action-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-main { background: var(--primary); color: white; }
    .btn-stop { background: var(--danger); color: white; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); }
    .btn-accent { background: #6366f1; color: white; }
    
    .btn-toggle-lap { 
      background: transparent; 
      color: var(--text-muted); 
      padding: 8px; 
      min-width: auto; 
      flex: none; 
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-toggle-lap.active { color: var(--primary); border-color: var(--primary); }
    .btn-toggle-lap.inactive { color: var(--danger); border-color: var(--danger); }

    .settings-panel {
      background: rgba(0,0,0,0.2);
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .input-field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
    .input-field select, .input-field input {
      width: 100%;
      background: #334155;
      border: 1px solid #475569;
      color: white;
      padding: 8px;
      border-radius: 6px;
    }

    .table-container {
      margin-top: 20px;
      border-radius: 12px;
      background: rgba(0,0,0,0.2);
      max-height: 400px;
      overflow-y: auto;
    }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px; font-size: 12px; color: var(--text-muted); border-bottom: 1px solid #334155; position: sticky; top: 0; background: #1e293b; z-index: 10; }
    td { padding: 12px; border-bottom: 1px solid #334155; font-size: 13px; vertical-align: middle; transition: background 0.3s; }

    .lap-record { color: var(--warning); font-weight: bold; }
    .crown-icon { color: var(--crown-color); margin-right: 5px; font-style: normal; }
    .lap-inactive { opacity: 0.4; background: rgba(0,0,0,0.1) !important; }
    .lap-triple-highlight { background: var(--highlight) !important; border-left: 4px solid var(--warning); }
    
    .img-pair { display: flex; gap: 4px; }
    .img-preview { 
      width: 80px; 
      height: 60px; 
      border-radius: 4px; 
      object-fit: cover; 
      border: 1px solid rgba(255,255,255,0.1);
      display: block;
      background: #000;
    }
    .img-label { font-size: 8px; color: var(--text-muted); display: block; text-align: center; margin-bottom: 2px; }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 20px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }
    .modal-content h3 { margin-top: 0; color: var(--primary); }
    .modal-content textarea {
      width: 100%;
      height: 200px;
      background: #0f172a;
      border: 1px solid #475569;
      color: var(--text);
      padding: 10px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      margin: 15px 0;
      resize: none;
    }
    .modal-actions { display: flex; gap: 10px; }

    #hud {
      position: absolute;
      top: 10px; left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 5px 10px;
      border-radius: 6px;
      font-family: monospace;
      color: var(--primary);
      z-index: 10;
    }

    #big-timer {
      position: absolute;
      bottom: 20px; right: 20px;
      font-size: 48px; font-weight: 800;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      color: white;
      z-index: 10;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="video-wrapper">
    <canvas id="raceCanvas" width="640" height="480"></canvas>
    <div class="gate-overlay line-v" id="gateLine"></div>
    <div id="hud">SENS: <span id="sensDisp">40</span> | <span id="statusTxt">BEREIT</span></div>
    <div id="big-timer">0.00</div>
    <div id="countdown" style="position:absolute; top:0; left:0; width:100%; height:100%; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.7); font-size:120px; font-weight:bold; z-index:20;">3</div>
  </div>

  <div class="dashboard">
    <div class="stat-box">
      <span class="stat-label">Beste Runde</span>
      <span class="stat-value" id="val-best">--.--</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Letzte Runde</span>
      <span class="stat-value" id="val-last">--.--</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Aktive Runden</span>
      <span class="stat-value" id="val-count">0</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Beste 3 Runden</span>
      <span class="stat-value" id="val-triple">--.--</span>
    </div>
  </div>

  <div class="action-bar">
    <button id="btnToggle" class="btn-main" onclick="handleMainAction()">START</button>
    <button class="btn-secondary" onclick="clearSession()">RESET</button>
    <button class="btn-accent" onclick="copyToClipboard()">KOPIEREN</button>
    <button class="btn-secondary" onclick="exportCSV()">EXPORT (CSV)</button>
    <button class="btn-secondary" onclick="openImportModal()">IMPORT (TABELLE)</button>
  </div>

  <div class="settings-panel">
    <div class="input-field">
      <label>KAMERA</label>
      <select id="camSelect" onchange="switchCam(this.value)"></select>
    </div>
    <div class="input-field">
      <label>SENSITIVITÄT</label>
      <input type="range" min="5" max="250" value="40" id="sensRange" oninput="updateSens(this.value)">
    </div>
    <div class="input-field">
      <label>FLUG-RICHTUNG</label>
      <select id="dirSelect" onchange="updateGateUI(this.value)">
        <option value="LR">Links ➔ Rechts</option>
        <option value="RL">Rechts ➔ Links</option>
        <option value="TB">Oben ➔ Unten</option>
        <option value="BT">Unten ➔ Oben</option>
      </select>
    </div>
    <div class="input-field">
      <label>MIN. RUNDE (S)</label>
      <input type="number" id="minLap" value="1.5" step="0.5">
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>DATUM / ZEIT</th>
          <th>DAUER</th>
          <th>BILDER (TRIGGER-PUNKT)</th>
          <th>STATUS</th>
        </tr>
      </thead>
      <tbody id="lapTableBody"></tbody>
    </table>
  </div>
</div>

<!-- Import Modal -->
<div id="importModal" class="modal">
  <div class="modal-content">
    <h3>Daten importieren</h3>
    <p style="font-size: 12px; color: var(--text-muted);">Füge hier die kopierten Tabellendaten ein (CSV oder Tab-getrennt):</p>
    <textarea id="importArea" placeholder="Runde;Datum;Uhrzeit;Rundenzeit (s);Status..."></textarea>
    <div class="modal-actions">
      <button class="btn-main" onclick="processImport()">IMPORTIEREN</button>
      <button class="btn-secondary" onclick="closeImportModal()">ABBRECHEN</button>
    </div>
  </div>
</div>

<script>
  let state = {
    running: false,
    armed: false,
    lastPassTime: 0,
    bestLap: Infinity,
    bestTriple: Infinity,
    tripleIndices: [], 
    laps: [],
    sensitivity: 40,
    lastFrame: null,
    currentX: null,
    currentY: null,
    prevX: null,
    prevY: null,
    gateStatus: 0, 
    readyTimestamp: 0,
    lockoutUntil: 0,
    preImage: null 
  };

  const video = document.createElement('video');
  const canvas = document.getElementById('raceCanvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const lapTableBody = document.getElementById('lapTableBody');

  async function init() {
    updateSens(state.sensitivity);
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams = devices.filter(d => d.kind === 'videoinput');
      const select = document.getElementById('camSelect');
      cams.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.deviceId;
        opt.text = c.label || `Kamera ${select.length + 1}`;
        select.appendChild(opt);
      });
      startStream(cams[0]?.deviceId);
    } catch (e) { console.error("Kamerafehler", e); }
    requestAnimationFrame(processFrame);
  }

  async function startStream(id) {
    if (window.stream) window.stream.getTracks().forEach(t => t.stop());
    const constraints = { video: id ? { deviceId: id } : { facingMode: 'environment' } };
    window.stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = window.stream;
    video.setAttribute('playsinline', true);
    video.play();
  }

  function switchCam(id) { startStream(id); }

  function updateSens(v) {
    state.sensitivity = parseInt(v);
    document.getElementById('sensDisp').innerText = v;
  }

  function updateGateUI(dir) {
    const gate = document.getElementById('gateLine');
    gate.className = (dir === 'LR' || dir === 'RL') ? 'gate-overlay line-v' : 'gate-overlay line-h';
    resetGateStatus();
  }

  function resetGateStatus() {
    state.gateStatus = 0;
    state.readyTimestamp = 0;
    state.lockoutUntil = 0;
    state.preImage = null;
  }

  function handleMainAction() {
    if (state.running || state.armed) stopRace();
    else startCountdown();
  }

  function startCountdown() {
    const cd = document.getElementById('countdown');
    cd.style.display = 'flex';
    let count = 3;
    cd.innerText = count;
    announce(count);
    
    const itv = setInterval(() => {
      count--;
      if (count <= 0) {
        clearInterval(itv);
        cd.style.display = 'none';
        state.armed = true;
        resetGateStatus();
        document.getElementById('statusTxt').innerText = "SCHARF";
        document.getElementById('btnToggle').innerText = "STOPP";
        document.getElementById('btnToggle').className = "btn-stop";
        announce("Los");
      } else {
        cd.innerText = count;
        announce(count);
      }
    }, 1000);
  }

  function stopRace() {
    state.running = false;
    state.armed = false;
    resetGateStatus();
    document.getElementById('statusTxt').innerText = "BEREIT";
    document.getElementById('btnToggle').innerText = "START";
    document.getElementById('btnToggle').className = "btn-main";
    document.getElementById('big-timer').innerText = "0.00";
  }

  function processFrame() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      ctx.drawImage(video, 0, 0, 640, 480);
      const currentFrameData = ctx.getImageData(0, 0, 640, 480);
      
      if (state.lastFrame) detectMotion(currentFrameData, state.lastFrame);
      state.lastFrame = currentFrameData;

      if (state.currentX !== null) drawTriggerCircle(ctx, state.currentX, state.currentY, state.gateStatus);

      if (state.running) {
        const elapsed = (Date.now() - state.lastPassTime) / 1000;
        document.getElementById('big-timer').innerText = elapsed.toFixed(2);
      }
    }
    requestAnimationFrame(processFrame);
  }

  function drawTriggerCircle(targetCtx, x, y, status) {
    targetCtx.fillStyle = status === 1 ? '#10b981' : (status === -1 ? '#ef4444' : '#f59e0b'); 
    targetCtx.beginPath();
    targetCtx.arc(x, y, 15, 0, Math.PI * 2);
    targetCtx.fill();
    targetCtx.strokeStyle = 'white';
    targetCtx.lineWidth = 2;
    targetCtx.stroke();
  }

  function captureCurrentView(x, y, status) {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = 640;
    tempCanvas.height = 480;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.drawImage(canvas, 0, 0);
    drawTriggerCircle(tempCtx, x, y, status);
    return tempCanvas.toDataURL('image/jpeg', 0.2);
  }

  function detectMotion(now, prev) {
    const dNow = now.data;
    const dPrev = prev.data;
    let motionX = 0, motionY = 0, count = 0;
    const step = 6; 

    for (let y = 0; y < 480; y += step) {
      for (let x = 0; x < 640; x += step) {
        const i = (y * 640 + x) * 4;
        const diff = (Math.abs(dNow[i] - dPrev[i]) + Math.abs(dNow[i+1] - dPrev[i+1]) + Math.abs(dNow[i+2] - dPrev[i+2])) / 3;
        if (diff > 30) { motionX += x; motionY += y; count++; }
      }
    }

    if (count > state.sensitivity) {
      state.prevX = state.currentX; state.prevY = state.currentY;
      state.currentX = motionX / count; state.currentY = motionY / count;
      checkTrigger(state.currentX, state.currentY);
    } else {
      if (Date.now() - state.readyTimestamp > 200) {
         state.currentX = null; state.currentY = null;
         state.gateStatus = 0; state.preImage = null;
      }
    }
  }

  function checkTrigger(x, y) {
    if (!state.armed && !state.running) return;
    const now = Date.now();
    if (now < state.lockoutUntil) return;

    const dir = document.getElementById('dirSelect').value;
    const minS = parseFloat(document.getElementById('minLap').value) * 1000;
    const midX = 320, midY = 240;

    let inPreZone = false, inPostZone = false, vectorCorrect = false;

    if (dir === 'LR') {
      inPreZone = (x < midX + 5); inPostZone = (x > midX - 5);
      if (state.prevX !== null) vectorCorrect = (x > state.prevX + 1);
    } else if (dir === 'RL') {
      inPreZone = (x > midX - 5); inPostZone = (x < midX + 5);
      if (state.prevX !== null) vectorCorrect = (x < state.prevX - 1);
    } else if (dir === 'TB') {
      inPreZone = (y < midY + 5); inPostZone = (y > midY - 5);
      if (state.prevY !== null) vectorCorrect = (y > state.prevY + 1);
    } else if (dir === 'BT') {
      inPreZone = (y > midY - 5); inPostZone = (y < midY + 5);
      if (state.prevY !== null) vectorCorrect = (y < state.prevY - 1);
    }

    if (inPreZone && !inPostZone) {
      if (state.gateStatus !== 1) state.preImage = captureCurrentView(x, y, 1);
      state.gateStatus = 1; state.readyTimestamp = now;
    }

    if (inPostZone) {
      const wasReady = (state.gateStatus === 1 && (now - state.readyTimestamp < 200));
      if (wasReady) {
        let finalTrigger = vectorCorrect;
        if (!finalTrigger) {
          if (dir === 'LR' && x > midX + 15) finalTrigger = true;
          if (dir === 'RL' && x < midX - 15) finalTrigger = true;
          if (dir === 'TB' && y > midY + 15) finalTrigger = true;
          if (dir === 'BT' && y < midY - 15) finalTrigger = true;
        }

        if (finalTrigger && (now - state.lastPassTime > minS)) {
          handlePass(now, x, y);
          state.lockoutUntil = now + 1000; state.gateStatus = 0;
        }
      } else if (state.gateStatus === 0 && !inPreZone) {
        state.gateStatus = -1;
      }
    }
  }

  function handlePass(now, triggerX, triggerY) {
    const postImage = captureCurrentView(triggerX, triggerY, 1);
    const preImage = state.preImage || postImage;

    if (state.armed) {
      state.armed = false; state.running = true; state.lastPassTime = now;
      document.getElementById('statusTxt').innerText = "RENNEN LÄUFT";
      announce("Start"); return;
    }

    const lapTime = (now - state.lastPassTime) / 1000;
    state.lastPassTime = now;
    
    // Alte Bestwerte speichern für Vergleich
    const oldBestLap = state.bestLap;
    const oldBestTriple = state.bestTriple;

    const fullDate = new Date();
    state.laps.push({
      id: Date.now(),
      rawTime: lapTime,
      active: true,
      date: fullDate.toLocaleDateString('de-DE'),
      timestamp: fullDate.toLocaleTimeString('de-DE'),
      preImg: preImage,
      postImg: postImage
    });

    recalculateAndUI();
    
    // Prüfen ob Rekorde gebrochen wurden
    const isNewLapRecord = state.bestLap < oldBestLap && state.bestLap !== Infinity;
    const isNewTripleRecord = state.bestTriple < oldBestTriple && state.bestTriple !== Infinity;

    const activeLaps = state.laps.filter(l => l.active);
    const lastActiveLap = activeLaps[activeLaps.length - 1];
    const displayTime = lastActiveLap ? lastActiveLap.displayTime : lapTime;

    let voiceMsg = "";
    if (isNewLapRecord) voiceMsg += "Neue Bestzeit. ";
    if (isNewTripleRecord) voiceMsg += "Neuer Triple Rekord. ";
    voiceMsg += displayTime.toFixed(1);

    announce(voiceMsg);
  }

  function toggleLap(lapId) {
    const lap = state.laps.find(l => l.id === lapId);
    if (lap) {
      lap.active = !lap.active;
      recalculateAndUI();
    }
  }

  function recalculateAndUI() {
    let carryOver = 0;
    const activeLaps = [];

    state.laps.forEach(lap => {
      lap.displayTime = lap.rawTime + carryOver;
      if (lap.active) {
        activeLaps.push(lap);
        carryOver = 0;
      } else {
        carryOver = lap.displayTime;
      }
    });

    if (activeLaps.length === 0) {
      state.bestLap = Infinity;
      state.bestTriple = Infinity;
      state.tripleIndices = [];
    } else {
      state.bestLap = Math.min(...activeLaps.map(l => l.displayTime));
      state.bestTriple = Infinity;
      state.tripleIndices = [];
      if (activeLaps.length >= 3) {
        for (let i = 0; i <= activeLaps.length - 3; i++) {
          const sum = activeLaps[i].displayTime + activeLaps[i+1].displayTime + activeLaps[i+2].displayTime;
          if (sum < state.bestTriple) {
            state.bestTriple = sum;
            state.tripleIndices = [activeLaps[i].id, activeLaps[i+1].id, activeLaps[i+2].id];
          }
        }
      }
    }
    updateUI(activeLaps.length);
  }

  function updateUI(activeCount) {
    document.getElementById('val-count').innerText = activeCount;
    const activeOnly = state.laps.filter(l => l.active);
    
    if (activeOnly.length > 0) {
      document.getElementById('val-last').innerText = activeOnly[activeOnly.length-1].displayTime.toFixed(2);
      document.getElementById('val-best').innerText = state.bestLap === Infinity ? '--.--' : state.bestLap.toFixed(2);
    } else {
      document.getElementById('val-last').innerText = '--.--';
      document.getElementById('val-best').innerText = '--.--';
    }
    document.getElementById('val-triple').innerText = state.bestTriple === Infinity ? '--.--' : state.bestTriple.toFixed(2);

    lapTableBody.innerHTML = "";
    [...state.laps].reverse().forEach((l, idx) => {
        const actualIdx = state.laps.indexOf(l);
        const isTriple = state.tripleIndices.includes(l.id);
        const isBest = l.active && l.displayTime === state.bestLap;
        const row = document.createElement('tr');
        
        if (!l.active) row.className = "lap-inactive";
        else if (isTriple) row.className = "lap-triple-highlight";

        row.innerHTML = `
          <td>${actualIdx + 1}</td>
          <td><span style="font-size:10px; color:var(--text-muted)">${l.date}</span><br>${l.timestamp}</td>
          <td class="${isBest ? 'lap-record' : ''}">
            ${isBest ? '<i class="crown-icon">👑</i>' : ''}
            ${l.active ? l.displayTime.toFixed(2) + 's' : '<span style="color:var(--danger)">IGNORIERT</span>'}
          </td>
          <td>
            <div class="img-pair">
                <div><span class="img-label">TRIGGER</span>${l.preImg ? `<img src="${l.preImg}" class="img-preview">` : '<div class="img-preview"></div>'}</div>
                <div><span class="img-label">PASS</span>${l.postImg ? `<img src="${l.postImg}" class="img-preview">` : '<div class="img-preview"></div>'}</div>
            </div>
          </td>
          <td>
            <button class="btn-toggle-lap ${l.active ? 'active' : 'inactive'}" onclick="toggleLap(${l.id})">
              ${l.active ? 'WERTEN' : 'ZUSAMMENFÜHREN'}
            </button>
          </td>
        `;
        lapTableBody.appendChild(row);
    });
  }

  function announce(txt) {
    if (!txt) return;
    const msg = new SpeechSynthesisUtterance(txt);
    msg.lang = 'de-DE'; msg.rate = 1.6; window.speechSynthesis.speak(msg);
  }

  function clearSession() {
    if(confirm("Alle Daten löschen?")) {
      state.laps = []; state.bestLap = Infinity; state.bestTriple = Infinity;
      lapTableBody.innerHTML = ''; state.lastPassTime = 0; recalculateAndUI(); stopRace();
    }
  }

  function copyToClipboard() {
    let csv = "Runde;Datum;Uhrzeit;Rundenzeit (s);Status\n";
    state.laps.forEach((l, i) => {
      csv += `${i+1};${l.date};${l.timestamp};${l.displayTime.toFixed(3).replace('.',',')};${l.active?'Aktiv':'Ignoriert'}\n`;
    });
    navigator.clipboard.writeText(csv).then(() => {
        const btn = document.querySelector('.btn-accent');
        const oldTxt = btn.innerText;
        btn.innerText = "KOPIERT!";
        setTimeout(() => btn.innerText = oldTxt, 1500);
    });
  }

  function exportCSV() {
    if (state.laps.length === 0) return alert("Keine Daten vorhanden!");
    let csvContent = "\uFEFFRunde;Datum;Uhrzeit;Rundenzeit (s);Status\n";
    state.laps.forEach((l, i) => {
      csvContent += `${i+1};${l.date};${l.timestamp};${l.displayTime.toFixed(3).replace('.',',')};${l.active?'Aktiv':'Ignoriert'}\n`;
    });
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `FPV_Race_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
  }

  // --- Modal Logic ---
  function openImportModal() { document.getElementById('importModal').style.display = 'flex'; }
  function closeImportModal() { 
    document.getElementById('importModal').style.display = 'none';
    document.getElementById('importArea').value = "";
  }

  function processImport() {
    const text = document.getElementById('importArea').value.trim();
    if (!text) return closeImportModal();

    const lines = text.split('\n');
    const newLaps = [];
    let importedCount = 0;

    lines.forEach((line, index) => {
      if (index === 0 && (line.includes('Runde') || line.includes('Datum'))) return;

      let parts = [];
      if (line.includes(';')) parts = line.split(';');
      else if (line.includes('\t')) parts = line.split('\t');
      else parts = line.split(',');

      if (parts.length >= 4) {
        let timeStr = parts[3].trim().replace(',', '.').replace('s', '');
        let time = parseFloat(timeStr);
        let statusStr = parts[4] ? parts[4].trim().toLowerCase() : 'aktiv';

        if (!isNaN(time)) {
          newLaps.push({
            id: Date.now() + importedCount,
            rawTime: time,
            active: statusStr !== 'ignoriert' && statusStr !== 'deaktiviert',
            date: parts[1].trim(),
            timestamp: parts[2].trim(),
            preImg: null, 
            postImg: null
          });
          importedCount++;
        }
      }
    });

    if (newLaps.length > 0) {
      if (state.laps.length > 0 && confirm(`${importedCount} Runden gefunden. Bestehende Liste ersetzen? (Abbrechen fügt sie hinzu)`)) {
        state.laps = newLaps;
      } else {
        state.laps = [...state.laps, ...newLaps];
      }
      recalculateAndUI();
      alert(`${importedCount} Runden erfolgreich importiert!`);
      closeImportModal();
    } else {
      alert("Keine gültigen Daten gefunden. Bitte stelle sicher, dass das Format korrekt ist (Kopierte Tabelle).");
    }
  }

  window.onclick = function(event) {
    if (event.target == document.getElementById('importModal')) closeImportModal();
  }

  init();
</script>

</body>
</html>
